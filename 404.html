<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:#f0f4f8;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .kart{
    background:#fff;
    border-radius:18px;
    box-shadow:0 8px 40px rgba(0,0,0,.10);
    padding:52px 44px 44px;
    max-width:480px;
    width:100%;
    text-align:center;
  }
  .ikon{
    width:72px;height:72px;
    background:#eff6ff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;
  }
  .ikon svg{width:36px;height:36px;fill:#2563eb;}
  .kod{
    font-size:5rem;font-weight:900;
    color:#e2e8f0;
    line-height:1;
    margin-bottom:8px;
    letter-spacing:-.04em;
  }
  h1{
    font-size:1.3rem;font-weight:700;
    color:#1a2540;margin-bottom:10px;
  }
  p{
    font-size:.9rem;color:#64748b;
    line-height:1.7;margin-bottom:32px;
  }
  .btn-ana{
    display:inline-flex;align-items:center;gap:8px;
    background:#2563eb;color:#fff;
    text-decoration:none;
    padding:12px 28px;border-radius:9px;
    font-size:.9rem;font-weight:700;
    transition:background .2s,box-shadow .2s;
  }
  .btn-ana:hover{background:#1d4ed8;box-shadow:0 4px 16px rgba(37,99,235,.28);}
  .btn-giris{
    display:inline-flex;align-items:center;gap:8px;
    background:#f1f5f9;color:#374162;
    text-decoration:none;
    padding:11px 24px;border-radius:9px;
    font-size:.88rem;font-weight:600;
    margin-left:10px;
    transition:background .2s;
  }
  .btn-giris:hover{background:#e2e8f0;}
  .logo{
    margin-top:36px;
    font-size:.72rem;
    color:#94a3b8;
    letter-spacing:.06em;
    text-transform:uppercase;
  }
