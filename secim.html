<!DOCTYPE html>

<title>Modül Seçimi — İBKB SORGULAMA VE İHRACAT TAKİP YAZILIMI</title>
<link rel="manifest" href="/manifest.json">

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans','Segoe UI',system-ui,sans-serif;
    background:linear-gradient(140deg,#0f172a 0%,#1a2540 60%,#243354 100%);
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    animation:_fadeIn .2s ease forwards;
  }
  @keyframes _fadeIn{from{opacity:0}to{opacity:1}}

  .kart{width:100%;max-width:520px;text-align:center;}

  .logo{height:44px;width:auto;margin-bottom:36px;opacity:.95;}

  h2{color:#fff;font-size:1.3rem;font-weight:700;margin:0 0 8px;}
  .alt{color:rgba(255,255,255,.45);font-size:.875rem;margin:0 0 28px;}

  /* Duyuru */
  .duyuru-kutu{
    display:none;position:relative;
    margin-bottom:20px;padding:12px 44px 12px 16px;
    border-radius:10px;text-align:left;font-size:.82rem;line-height:1.5;
  }
  .duyuru-kapat{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:inherit;
    opacity:.55;font-size:1.3rem;padding:4px 8px;line-height:1;
  }
  .duyuru-kapat:hover{opacity:1;}

  /* Modül kartları */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
  @media(max-width:420px){.grid{grid-template-columns:1fr;}}

  .modul{
    display:block;padding:28px 20px;
    border-radius:14px;text-decoration:none;
    transition:background .15s,border-color .15s,transform .12s;
  }
  .modul:hover{transform:translateY(-2px);}
  .modul-mavi{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);
  }
  .modul-mavi:hover{
    background:rgba(255,255,255,.09);
    border-color:rgba(255,255,255,.22);
  }
  .modul-altin{
    background:rgba(217,119,6,.06);
    border:1px solid rgba(245,158,11,.2);
  }
  .modul-altin:hover{
    background:rgba(245,158,11,.12);
    border-color:rgba(245,158,11,.4);
  }
  .modul-ikon{
    width:44px;height:44px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 14px;font-size:1.3rem;
  }
  .ikon-mavi{background:rgba(37,99,235,.2);}
  .ikon-altin{background:rgba(245,158,11,.15);}
  .modul-baslik{font-size:.95rem;font-weight:700;margin-bottom:6px;}
  .modul-baslik-mavi{color:#fff;}
  .modul-baslik-altin{color:#f59e0b;}
  .modul-acik{color:rgba(255,255,255,.4);font-size:.78rem;line-height:1.5;}

  .alt-not{color:rgba(255,255,255,.18);font-size:.72rem;}

  /* Çıkış butonu */
  .cikis-btn{
    margin-top:32px;
    background:none;border:none;
    color:rgba(255,255,255,.3);font-size:.78rem;
    cursor:pointer;font-family:inherit;
    transition:color .15s;
  }
  .cikis-btn:hover{color:rgba(255,255,255,.6);}
</style>

<script>
function _bakimSayfasiGoster(mesaj, logo) {
  if (document.getElementById('_bm')) return;
  var s = document.createElement('style');
  s.textContent = [
    '#_bm{position:fixed;inset:0;z-index:99999;background:#0f172a;display:flex;align-items:center;justify-content:center;padding:24px;}',
    '#_bk{text-align:center;max-width:480px;width:100%;}',
    '#_blogo{height:44px;width:auto;margin-bottom:28px;opacity:.85;}',
    '#_bi{font-size:2.8rem;margin-bottom:16px;display:block;}',
    '#_bh{color:#fff;font-size:1.25rem;font-weight:700;margin:0 0 10px;}',
    '#_bp{color:rgba(255,255,255,.55);font-size:.9rem;line-height:1.6;margin:0 0 24px;}',
    '#_bb{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:8px 18px;border-radius:8px;color:rgba(255,255,255,.5);font-size:.8rem;}',
    '.dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:_bpulse 1.4s ease-in-out infinite;}',
    '@keyframes _bpulse{0%,100%{opacity:.3}50%{opacity:1}}'
  ].join('');
  document.head.appendChild(s);
  var d = document.createElement('div'); d.id = '_bm';
  var k = document.createElement('div'); k.id = '_bk';
  if (logo) {
    var lg = document.createElement('img'); lg.id = '_blogo'; lg.src = logo; lg.alt = '';
    k.appendChild(lg);
  }
  var i = document.createElement('div'); i.id = '_bi'; i.textContent = '🔧';
  var h = document.createElement('h1'); h.id = '_bh'; h.textContent = 'Sistem Bakımda';
  var p = document.createElement('p'); p.id = '_bp'; p.textContent = mesaj || 'Yakında tekrar hizmetinizdeyiz.';
  var b = document.createElement('div'); b.id = '_bb';
  var dot = document.createElement('span'); dot.className = 'dot';
  b.appendChild(dot);
  b.appendChild(document.createTextNode(' Kısa süre sonra tekrar deneyin'));
  k.appendChild(i); k.appendChild(h); k.appendChild(p); k.appendChild(b);
  d.appendChild(k); document.body.appendChild(d);
  document.title = 'Sistem Bakımda';
}
</script>
</head>
<body>
<script>
// SENKRON bakim kontrolu - flash olmadan icerigi durdurur
(function(){
  try{
    var _sc = JSON.parse(localStorage.getItem('ibkb_config')||'{}');
    if(_sc.bakim && _sc.bakim.aktif){
      document.body.style.opacity = '1';
      _bakimSayfasiGoster(_sc.bakim.mesaj || '', _sc.logo || '');
    } else {
      document.body.style.animation = '_fadeIn .18s ease forwards';
    }
  }catch(e){ document.body.style.animation = '_fadeIn .18s ease forwards'; }
})();
</script>


<script>
// Oturum kontrolü
(function(){
  if(!sessionStorage.getItem('govdag_token')){
    document.location.replace('./login.html');
  }
})();
</script>

<div class="kart">
  <img id="secimLogo" class="logo" alt="İBKB">

  <h2 id="secimBaslik">Hoş geldiniz</h2>
  <p class="alt" id="secimAlt">Devam etmek istediğiniz modülü seçin</p>

  <!-- DUYURU -->
  <div id="duyuruKutu" class="duyuru-kutu">
    <div style="display:flex;align-items:flex-start;gap:8px;">
      <span id="duyuruIkon" style="font-size:1rem;flex-shrink:0;margin-top:1px;"></span>
      <div>
        <div id="duyuruBaslik" style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-bottom:3px;"></div>
        <span id="duyuruMetin"></span>
      </div>
    </div>
    <button class="duyuru-kapat" onclick="duyuruKapat()" title="Kapat">×</button>
  </div>
  <!-- MEVZUAT -->
  <div id="mevzuatKutu" class="duyuru-kutu" style="display:none;">
    <div style="display:flex;align-items:flex-start;gap:8px;">
      <span style="font-size:1rem;flex-shrink:0;margin-top:1px;">📋</span>
      <div>
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.7;margin-bottom:3px;">Mevzuat Değişikliği</div>
        <span id="mevzuatMetinGoster"></span>
      </div>
    </div>
    <button class="duyuru-kapat" onclick="mevzuatKutuKapat()" title="Kapat">×</button>
  </div>

  <!-- MODÜLLER -->
  <div class="grid">
    <a href="./index.html" class="modul modul-mavi">
      <div class="modul-ikon ikon-mavi" id="secimMod1Ikon">🧮</div>
      <div class="modul-baslik modul-baslik-mavi" id="secimMod1Baslik">İBKB Hesaplama</div>
      <div class="modul-acik" id="secimMod1Acik">İhracat bedeli zorunluluk sorgulama ve hesaplama</div>
    </a>
    <a href="./takip.html" class="modul modul-altin">
      <div class="modul-ikon ikon-altin" id="secimMod2Ikon">📦</div>
      <div class="modul-baslik modul-baslik-altin" id="secimMod2Baslik">İhracat Takip</div>
      <div class="modul-acik" id="secimMod2Acik">180 gün süre takibi ve beyanname yönetimi</div>
    </a>
  </div>

  <p class="alt-not" id="secimAltNot">Modüller arasında istediğiniz zaman geçiş yapabilirsiniz</p>

  <button class="cikis-btn" onclick="cikisYap()">↩ Çıkış Yap</button>
</div>

<script>
function cikisYap(){
  sessionStorage.removeItem('govdag_token');
  sessionStorage.removeItem('govdag_email');
  sessionStorage.removeItem('govdag_refresh');
  window.location.replace('./login.html');
}

function mevzuatKutuKapat(){
  var el = document.getElementById('mevzuatKutu');
  if(el) el.style.display='none';
  var mv = JSON.parse(localStorage.getItem('ibkb_config')||'{}').mevzuat||{};
  sessionStorage.setItem('ibkb_mv_kapandi', mv.guncelleme||'kapandi');
}

function duyuruKapat(){
  var el = document.getElementById('duyuruKutu');
  if(el) el.style.display = 'none';
  sessionStorage.setItem('ibkb_duyuru_kapandi','1');
}

// Logo ve duyuru yükle
document.addEventListener('DOMContentLoaded', function(){
  try{
    var cfg = JSON.parse(localStorage.getItem('ibkb_config')||'{}');

    // Logo
    var logoEl = document.getElementById('secimLogo');
    if(logoEl && cfg.logo && cfg.logo.length > 10) logoEl.src = cfg.logo;
    else if(logoEl && typeof _LOGO_URI !== 'undefined' && _LOGO_URI) logoEl.src = _LOGO_URI;
    else if(logoEl) logoEl.style.display = 'none';

    // Yönetilebilir metinler
    var _sm = (cfg.metinler) || {};
    var _sat = function(id, val){ var el=document.getElementById(id); if(el && val) el.textContent=val; };
    _sat('secimBaslik',    _sm.secimBaslik);
    _sat('secimAlt',       _sm.secimAlt);
    _sat('secimAltNot',    _sm.secimAltNot);
    _sat('secimMod1Ikon',  _sm.secimMod1Ikon);
    _sat('secimMod1Baslik',_sm.secimMod1Baslik);
    _sat('secimMod1Acik',  _sm.secimMod1Acik);
    _sat('secimMod2Ikon',  _sm.secimMod2Ikon);
    _sat('secimMod2Baslik',_sm.secimMod2Baslik);
    _sat('secimMod2Acik',  _sm.secimMod2Acik);

    // Duyuru - tip bazlı ikon ve başlık
    var d = cfg.duyuru;
    if(d && d.aktif && d.metin && !sessionStorage.getItem('ibkb_duyuru_kapandi')){
      var tipRenk = {
        bilgi:  {bg:'rgba(37,99,235,.18)',  border:'rgba(147,197,253,.35)', color:'#93c5fd', ikon:'📢', baslik:'Duyuru'},
        uyari:  {bg:'rgba(217,119,6,.18)',  border:'rgba(253,211,77,.35)',  color:'#fde047', ikon:'⚠️', baslik:'Uyarı'},
        hata:   {bg:'rgba(185,28,28,.18)',  border:'rgba(252,165,165,.35)', color:'#fca5a5', ikon:'🚫', baslik:'Önemli Uyarı'},
        basari: {bg:'rgba(22,163,74,.18)',  border:'rgba(134,239,172,.35)', color:'#86efac', ikon:'✅', baslik:'Bilgilendirme'}
      };
      var r = tipRenk[d.tip||'bilgi'] || tipRenk.bilgi;
      var kutu = document.getElementById('duyuruKutu');
      var metin = document.getElementById('duyuruMetin');
      var ikon  = document.getElementById('duyuruIkon');
      var basl  = document.getElementById('duyuruBaslik');
      if(kutu && metin){
        kutu.style.background = r.bg;
        kutu.style.border = '1px solid '+r.border;
        kutu.style.color = r.color;
        metin.textContent = d.metin;
        if(ikon) ikon.textContent = r.ikon;
        if(basl) basl.textContent = r.baslik;
        kutu.style.display = 'block';
      }
    }

    // Mevzuat bildirimi - ayrı kutu
    var mv = cfg.mevzuat;
    if(mv && mv.aktif && mv.metin){
      var mvKapandi = sessionStorage.getItem('ibkb_mv_kapandi');
      var mvGuncelleme = mv.guncelleme||'';
      if(!mvKapandi || (mvGuncelleme && mvKapandi !== mvGuncelleme)){
        var mvKutu = document.getElementById('mevzuatKutu');
        var mvMetin = document.getElementById('mevzuatMetinGoster');
        if(mvKutu && mvMetin){
          mvKutu.style.background = 'rgba(217,119,6,.18)';
          mvKutu.style.border = '1px solid rgba(253,211,77,.35)';
          mvKutu.style.color = '#fde047';
          mvMetin.textContent = mv.metin;
          mvKutu.style.display = 'block';
        }
      }
    }

    // Görünüm (renk teması)
    if(cfg.gorunum){
      var g = cfg.gorunum;
      var st = document.createElement('style');
      var css = ':root{';
      if(g.blue)   css += '--blue:'+g.blue+';';
      if(g.gold)   css += '--gold:'+g.gold+';';
      if(g.navy)   css += '--navy:'+g.navy+';';
      if(g.radius) css += '--radius:'+g.radius+';';
      css += '}';
      // Sayfa özel
      if(g.secimBg)          css += 'body{background:'+g.secimBg+'!important;}';
      if(g.secimMod1Bg)      css += '.modul-mavi{background:'+g.secimMod1Bg+'!important;}';
      if(g.secimMod2Bg)      css += '.modul-altin{background:'+g.secimMod2Bg+'!important;}';
      if(g.secimBaslikColor) css += 'h2{color:'+g.secimBaslikColor+'!important;}';
      if(g.secimAltColor)    css += '.alt,.alt-not{color:'+g.secimAltColor+'!important;}';
      st.textContent = css;
      document.head.appendChild(st);
    }
  }catch(e){}
});
</script>
</body>
</html>
